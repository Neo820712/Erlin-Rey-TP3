<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Análisis de Activos</title>
  <!-- lightweight-charts v4 (TradingView), vanilla, sin build. Pineado para reproducibilidad.
       v4 expone addCandlestickSeries/addLineSeries/addHistogramSeries directo en el chart. -->
  <script src="https://unpkg.com/lightweight-charts@4.2.3/dist/lightweight-charts.standalone.production.js"
          crossorigin="anonymous"></script>
  <style>
    :root {
      --color-bg:           #f3f6fb;
      --color-surface:      #ffffff;
      --color-primary:      #0068b5;
      --color-primary-dark: #00285a;
      --color-accent:       #00c7fd;
      --color-text:         #1a1a1a;
      --color-text-muted:   #6c757d;
      --color-border:       #d9e2ec;

      --color-compra:    #1e7d34;
      --color-venta:     #c62828;
      --color-hold:      #f9a825;
      --color-sin-senal: #9aa5b1;

      --bg-compra:    #d4edda;
      --bg-venta:     #f8d7da;
      --bg-hold:      #fff3cd;
      --bg-sin-senal: #e9ecef;

      --space-sm: 8px;  --space-md: 16px;  --space-lg: 24px;
      --radius:   8px;

      --chart-sma20: #4A90D9;
      --chart-sma50: #F5A623;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
    }
    header {
      background: var(--color-primary);
      color: #fff;
      padding: var(--space-md) var(--space-lg);
      display: flex;
      align-items: baseline;
      gap: var(--space-md);
    }
    header h1 { margin: 0; font-size: 1.3rem; }
    header .contador { color: #cfe8ff; font-size: 0.9rem; }
    main { padding: var(--space-lg); max-width: 1100px; margin: 0 auto; }
    section { margin-bottom: var(--space-lg); }
    h2 { color: var(--color-primary-dark); font-size: 1.05rem; }

    form { display: flex; flex-wrap: wrap; gap: var(--space-md); align-items: flex-end; }
    .campo { display: flex; flex-direction: column; gap: 4px; }
    label { font-size: 0.8rem; color: var(--color-text-muted); }
    input, select {
      padding: var(--space-sm); border: 1px solid var(--color-border);
      border-radius: var(--radius); font-size: 0.9rem;
    }
    input:focus, select:focus { outline: 2px solid var(--color-accent); border-color: var(--color-accent); }
    button {
      padding: var(--space-sm) var(--space-md); border: none; border-radius: var(--radius);
      background: var(--color-primary); color: #fff; font-size: 0.9rem; cursor: pointer;
    }
    button:hover { background: var(--color-primary-dark); }
    button:disabled { background: var(--color-sin-senal); cursor: not-allowed; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: var(--space-md);
    }
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: var(--space-md);
      cursor: pointer;
    }
    .card:hover { border-color: var(--color-accent); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .ticker { font-size: 1.2rem; font-weight: 700; color: var(--color-primary-dark); }
    .nombre { color: var(--color-text-muted); font-size: 0.85rem; }
    .meta { color: var(--color-text-muted); font-size: 0.8rem; margin-top: 4px; }
    .badges { display: flex; gap: var(--space-sm); margin-top: var(--space-md); }
    .badge {
      font-size: 0.72rem; padding: 4px var(--space-sm); border-radius: 999px;
      color: #fff; white-space: nowrap;
    }
    .badge .etq { opacity: 0.85; margin-right: 4px; }
    .badge.compra { background: var(--color-compra); }
    .badge.venta  { background: var(--color-venta); }
    .badge.hold   { background: var(--color-hold); color: #5a4500; }
    .badge.sin    { background: var(--color-sin-senal); }

    .historial { margin-top: var(--space-md); border-top: 1px solid var(--color-border); padding-top: var(--space-sm); }
    .analisis-item { font-size: 0.82rem; padding: var(--space-sm) 0; border-bottom: 1px dashed var(--color-border); }
    .analisis-item .linea1 { display: flex; gap: var(--space-sm); align-items: center; }
    .pill { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
    .pill.compra { background: var(--bg-compra); color: var(--color-compra); }
    .pill.venta  { background: var(--bg-venta);  color: var(--color-venta); }
    .pill.hold   { background: var(--bg-hold);   color: #5a4500; }
    .pill.sin    { background: var(--bg-sin-senal); color: var(--color-text-muted); }
    .fecha { color: var(--color-text-muted); }
    .resumen { color: var(--color-text); margin-top: 2px; }

    .estado { padding: var(--space-sm) var(--space-md); border-radius: var(--radius); margin-bottom: var(--space-md); }
    .estado.error { background: var(--bg-venta); color: var(--color-venta); }
    .estado.loading { background: var(--bg-sin-senal); color: var(--color-text-muted); }
    .vacio { color: var(--color-text-muted); }

    /* Tabla de mercado */
    .toolbar { display: flex; align-items: center; gap: var(--space-md); flex-wrap: wrap; margin-bottom: var(--space-sm); }
    .toolbar .actualizado { color: var(--color-text-muted); font-size: 0.8rem; margin-left: auto; }
    .tabla-wrap { overflow-x: auto; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); }
    table.mercado { border-collapse: collapse; width: 100%; font-size: 0.85rem; }
    table.mercado th, table.mercado td { padding: var(--space-sm); text-align: right; white-space: nowrap; border-bottom: 1px solid var(--color-border); }
    table.mercado th:nth-child(1), table.mercado td:nth-child(1),
    table.mercado th:nth-child(2), table.mercado td:nth-child(2) { text-align: left; }
    table.mercado th { cursor: pointer; color: var(--color-primary-dark); user-select: none; }
    table.mercado tbody tr { cursor: pointer; }
    table.mercado tbody tr:hover { background: var(--color-bg); }
    .var-pos { color: var(--color-compra); }
    .var-neg { color: var(--color-venta); }
    .rsi-bajo { color: var(--color-compra); }
    .rsi-alto { color: var(--color-venta); }

    /* Vista de detalle */
    .volver { background: none; color: var(--color-primary); padding: 0; margin-bottom: var(--space-md); }
    .volver:hover { background: none; text-decoration: underline; }
    .detalle-head { display: flex; align-items: center; gap: var(--space-md); flex-wrap: wrap; margin-bottom: var(--space-sm); }
    .detalle-head h2 { margin: 0; }
    #btn-cartera-detalle.btn-quitar { background: var(--color-venta); }
    #btn-cartera-detalle.btn-quitar:hover { background: var(--color-venta); filter: brightness(0.9); }
    .metricas { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-md); margin-bottom: var(--space-lg); }
    @media (max-width: 800px) { .metricas { grid-template-columns: 1fr; } }
    .metricas .fila .pill { font-size: 0.7rem; }
    .metricas .panel { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: var(--space-md); }
    .metricas h3 { margin: 0 0 var(--space-sm); color: var(--color-primary-dark); font-size: 0.9rem; }
    .metricas .fila { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed var(--color-border); font-size: 0.85rem; }
    .periodos { display: flex; gap: var(--space-sm); margin-bottom: var(--space-sm); }
    .periodos button.activo { background: var(--color-primary-dark); }
    #chart-velas, #chart-rsi, #chart-macd { width: 100%; }
    #chart-velas { height: 300px; } #chart-rsi { height: 90px; } #chart-macd { height: 90px; }
    .chart-block { margin-bottom: var(--space-sm); }
    .chart-head { display: flex; align-items: baseline; justify-content: space-between; gap: var(--space-md); flex-wrap: wrap; }
    .chart-title { margin: var(--space-sm) 0 4px; color: var(--color-primary-dark); font-size: 0.85rem; }
    .chart-legend { display: flex; gap: var(--space-md); font-size: 0.78rem; color: var(--color-text-muted); }
    .chart-legend .leg { display: inline-flex; align-items: center; gap: 6px; }
    .chart-legend .sw { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }
    .sw-sma20, .sw-macd { background: var(--chart-sma20); }
    .sw-sma50, .sw-signal { background: var(--chart-sma50); }

    footer { text-align: center; color: var(--color-text-muted); font-size: 0.8rem; padding: var(--space-lg); }
  </style>
</head>
<body>
  <header>
    <h1>Dashboard de Análisis de Activos</h1>
    <span class="contador" id="contador"></span>
  </header>
  <main>
    <section id="estado-global"></section>

    <section id="mercado">
      <h2>Mercado (CEDEARs)</h2>
      <div class="toolbar">
        <input id="m-filtro" placeholder="🔍 Filtrar por ticker o empresa…" autocomplete="off">
        <button id="m-actualizar">↻ Actualizar</button>
        <span class="actualizado" id="m-actualizado"></span>
      </div>
      <div class="tabla-wrap"><table class="mercado" id="tabla-mercado"></table></div>
    </section>

    <section id="lista-activos">
      <h2>Cartera de inversión</h2>
      <div class="grid" id="grid"></div>
    </section>

    <section id="detalle" style="display:none;">
      <button class="volver" id="btn-volver">← Volver</button>
      <div class="detalle-head">
        <h2 id="detalle-titulo"></h2>
        <button id="btn-cartera-detalle"></button>
      </div>
      <div class="metricas">
        <div class="panel"><h3>Datos de la acción</h3><div id="panel-accion"></div></div>
        <div class="panel"><h3>Análisis fundamental</h3><div id="panel-fundamental"></div></div>
        <div class="panel"><h3>Indicadores técnicos</h3><div id="panel-tecnico"></div></div>
      </div>
      <div class="periodos" id="periodos"></div>
      <div class="chart-block">
        <div class="chart-head">
          <h3 class="chart-title">Precio (velas) y medias móviles</h3>
          <div class="chart-legend">
            <span class="leg"><span class="sw sw-sma20"></span>SMA 20</span>
            <span class="leg"><span class="sw sw-sma50"></span>SMA 50</span>
          </div>
        </div>
        <div id="chart-velas"></div>
      </div>
      <div class="chart-block">
        <h3 class="chart-title">RSI (14)</h3>
        <div id="chart-rsi"></div>
      </div>
      <div class="chart-block">
        <div class="chart-head">
          <h3 class="chart-title">MACD (12, 26, 9)</h3>
          <div class="chart-legend">
            <span class="leg"><span class="sw sw-macd"></span>MACD</span>
            <span class="leg"><span class="sw sw-signal"></span>Señal</span>
          </div>
        </div>
        <div id="chart-macd"></div>
      </div>
      <div id="detalle-historial"></div>
    </section>
  </main>
  <footer>
    TP3 — CEIA UBA · <a href="https://github.com/Neo820712/Erlin-Rey-TP3">repositorio</a>
  </footer>

  <script>
    const API_BASE = 'http://localhost:8000';

    const state = {
      view: 'dashboard',          // 'dashboard' | 'detalle'
      activos: [],                // ActivoDetalle (con senales_recientes)
      cedears: [],                // data/cedears.json (autocompletado)
      mercado: [],                // filas de GET /mercado/cedears
      mercadoActualizado: null,   // timestamp
      mercadoSort: { col: null, dir: 'asc' },
      mercadoFiltro: '',
      detalle: null,              // payload de /historico del ticker abierto
      detalleTicker: null,
      detallePeriodo: '3m',
      detalleAnalisisTecnico: null,
      loading: false,
      error: null,
    };

    // --- utilidades ---
    function esc(texto) {
      const div = document.createElement('div');
      div.textContent = texto == null ? '' : String(texto);
      return div.innerHTML;
    }
    function claseSenal(senal) {
      // whitelist: la clase siempre es un valor conocido (no se interpola dato crudo en class=)
      return ['compra', 'venta', 'hold'].includes(senal) ? senal : 'sin';
    }
    function fmtNum(v, dec = 2) {
      return v == null ? '—' : Number(v).toLocaleString('es-AR', { minimumFractionDigits: dec, maximumFractionDigits: dec });
    }
    function fmtAbrev(v) {
      if (v == null) return '—';
      const abs = Math.abs(v);
      if (abs >= 1e12) return (v / 1e12).toFixed(1) + 'T';
      if (abs >= 1e9) return (v / 1e9).toFixed(1) + 'B';
      if (abs >= 1e6) return (v / 1e6).toFixed(1) + 'M';
      if (abs >= 1e3) return (v / 1e3).toFixed(1) + 'K';
      return String(v);
    }
    function getCssVar(nombre) {
      return getComputedStyle(document.documentElement).getPropertyValue(nombre).trim();
    }
    function fmtFechaArg(iso) {
      // El backend guarda UTC (...Z); se muestra en horario de Argentina, descriptivo.
      if (!iso) return '';
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      const tz = { timeZone: 'America/Argentina/Buenos_Aires' };
      const fecha = d.toLocaleDateString('es-AR', { ...tz, day: 'numeric', month: 'long', year: 'numeric' });
      const hora = d.toLocaleTimeString('es-AR', { ...tz, hour: '2-digit', minute: '2-digit', hour12: false });
      return `${fecha} a las ${hora}`;
    }

    // --- fetch helpers (todos manejan loading/error en quien los llama) ---
    async function api(path, opciones) {
      const resp = await fetch(`${API_BASE}${path}`, opciones);
      if (resp.status === 204) return null;
      const body = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        throw new Error(body.message || `Error ${resp.status}`);
      }
      return body;
    }

    async function cargarActivos() {
      state.loading = true; state.error = null; render();
      try {
        const lista = await api('/activos');
        const detalles = await Promise.all(lista.map((a) => api(`/activos/${a.id}`)));
        state.activos = detalles;
      } catch (e) {
        state.error = `No se pudieron cargar los activos: ${e.message}`;
      } finally {
        state.loading = false; render();
      }
    }

    async function cargarCedears() {
      try {
        state.cedears = await api('/mercado/catalogo');
      } catch (e) {
        state.cedears = [];  // solo afecta al lookup tipo/mercado del checkbox de cartera
      }
    }

    async function cargarMercado() {
      try {
        const data = await api('/mercado/cedears');
        state.mercado = data.cedears || [];
        state.mercadoActualizado = data.actualizado_en;
      } catch (e) {
        state.error = `No se pudo cargar el mercado: ${e.message}`;
      }
      render();
    }

    async function actualizarMercado() {
      state.loading = true; state.error = null; render();
      try {
        await api('/mercado/actualizar', { method: 'POST' });
        await cargarMercado();   // refetch obligatorio: POST no devuelve las filas
      } catch (e) {
        state.error = `No se pudo actualizar el mercado: ${e.message}`;
      } finally {
        state.loading = false; render();
      }
    }

    // --- render (única función que toca el DOM) ---
    function render() {
      const enDetalle = state.view === 'detalle';
      document.getElementById('detalle').style.display = enDetalle ? '' : 'none';
      ['mercado', 'lista-activos'].forEach((id) => {
        document.getElementById(id).style.display = enDetalle ? 'none' : '';
      });

      const estado = document.getElementById('estado-global');
      if (state.error) {
        estado.innerHTML = `<div class="estado error">${esc(state.error)}</div>`;
      } else if (state.loading) {
        estado.innerHTML = `<div class="estado loading">Cargando…</div>`;
      } else {
        estado.innerHTML = '';
      }

      if (enDetalle) { renderDetalle(); return; }

      document.getElementById('contador').textContent =
        state.activos.length ? `${state.activos.length} en cartera` : '';

      renderMercado();
      const btnAct = document.getElementById('m-actualizar');
      if (btnAct) {
        btnAct.disabled = state.loading;
        btnAct.textContent = state.loading ? 'Cargando…' : '↻ Actualizar';
      }

      const grid = document.getElementById('grid');
      if (!state.activos.length && !state.loading) {
        grid.innerHTML = `<p class="vacio">Tu cartera está vacía. Tildá un ticker en la tabla de mercado.</p>`;
      } else {
        grid.innerHTML = state.activos.map(cardHTML).join('');
        grid.querySelectorAll('.card').forEach((el) => {
          el.addEventListener('click', () => abrirDetalle(el.dataset.ticker));
        });
      }
    }

    function badgeHTML(etiqueta, senal) {
      const clase = claseSenal(senal);
      const texto = senal ? senal : 'sin datos';
      return `<span class="badge ${clase}"><span class="etq">${etiqueta}</span>${esc(texto)}</span>`;
    }

    function cardHTML(activo) {
      const sr = activo.senales_recientes || {};
      const scoreTxt = sr.score != null ? ` · ${Math.round(sr.score)}` : '';
      return `
        <div class="card" data-id="${activo.id}" data-ticker="${esc(activo.ticker)}">
          <div class="card-top">
            <div>
              <div class="ticker">${esc(activo.ticker)}</div>
              <div class="nombre">${esc(activo.nombre)}</div>
            </div>
          </div>
          <div class="meta">${esc(activo.tipo)} · ${esc(activo.mercado)}</div>
          <div class="badges">
            <span class="badge ${claseSenal(sr.tecnico)}"><span class="etq">Técnico</span>${esc(sr.tecnico ? sr.tecnico + scoreTxt : 'sin datos')}</span>
            ${badgeHTML('Sentim.', sr.sentimiento)}
          </div>
        </div>`;
    }

    // --- tabla de mercado ---
    const COLS_MERCADO = [
      { key: 'ticker_byma', label: 'Ticker' },
      { key: 'nombre', label: 'Empresa' },
      { key: 'precio_usd', label: 'Precio (USD)' },
      { key: 'var_pct', label: 'Var %' },
      { key: 'volumen', label: 'Volumen' },
      { key: 'pe', label: 'P/E' },
      { key: 'market_cap', label: 'Market Cap' },
      { key: 'cartera', label: 'Cartera' },
    ];

    function filasMercadoVisibles() {
      const q = state.mercadoFiltro.trim().toLowerCase();
      let filas = state.mercado.filter((c) =>
        !q || c.ticker_byma.toLowerCase().includes(q) || c.nombre.toLowerCase().includes(q));
      const { col, dir } = state.mercadoSort;
      if (col) {
        filas = [...filas].sort((a, b) => {
          const va = a[col], vb = b[col];
          if (va == null) return 1;
          if (vb == null) return -1;
          const cmp = typeof va === 'string' ? va.localeCompare(vb) : va - vb;
          return dir === 'asc' ? cmp : -cmp;
        });
      }
      return filas;
    }

    function celdaMercado(c, key) {
      if (key === 'var_pct') {
        if (c.var_pct == null) return { texto: '—', clase: '' };
        const flecha = c.var_pct >= 0 ? '▲' : '▼';
        return { texto: `${flecha} ${fmtNum(c.var_pct)}%`, clase: c.var_pct >= 0 ? 'var-pos' : 'var-neg' };
      }
      if (key === 'precio_usd') return { texto: fmtNum(c.precio_usd), clase: '' };
      if (key === 'pe') return { texto: fmtNum(c.pe), clase: '' };
      if (key === 'volumen') return { texto: fmtAbrev(c.volumen), clase: '' };
      if (key === 'market_cap') return { texto: fmtAbrev(c.market_cap), clase: '' };
      return { texto: c[key] == null ? '—' : String(c[key]), clase: '' };
    }

    function activoDeTicker(tickerByma) {
      return state.activos.find((a) => a.ticker === tickerByma) || null;
    }

    async function toggleCartera(cedear, agregar) {
      state.loading = true; state.error = null; render();
      try {
        if (agregar) {
          const cat = state.cedears.find((c) => c.ticker_byma === cedear.ticker_byma);
          await api('/activos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              ticker: cedear.ticker_byma,
              nombre: cedear.nombre,
              tipo: cat ? cat.tipo : 'accion',
              mercado: cat ? cat.mercado : 'NASDAQ',
            }),
          });
        } else {
          const activo = activoDeTicker(cedear.ticker_byma);
          if (activo) await api(`/activos/${activo.id}`, { method: 'DELETE' });
        }
        await cargarActivos();
      } catch (e) {
        state.error = `No se pudo actualizar la cartera: ${e.message}`;
        state.loading = false; render();
      }
    }

    function renderMercado() {
      const tabla = document.getElementById('tabla-mercado');
      if (!tabla) return;
      document.getElementById('m-actualizado').textContent =
        state.mercadoActualizado ? `Última actualización: ${fmtFechaArg(state.mercadoActualizado)}` : '';

      const filas = filasMercadoVisibles();
      const thead = document.createElement('thead');
      const trh = document.createElement('tr');
      for (const col of COLS_MERCADO) {
        const th = document.createElement('th');
        let marca = '';
        if (state.mercadoSort.col === col.key) marca = state.mercadoSort.dir === 'asc' ? ' ↑' : ' ↓';
        th.textContent = col.label + marca;
        if (col.key !== 'cartera') {
          th.addEventListener('click', () => {
            if (state.mercadoSort.col === col.key) {
              state.mercadoSort.dir = state.mercadoSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
              state.mercadoSort = { col: col.key, dir: 'asc' };
            }
            render();
          });
        } else {
          th.style.cursor = 'default';
        }
        trh.appendChild(th);
      }
      thead.appendChild(trh);

      const tbody = document.createElement('tbody');
      if (!filas.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = COLS_MERCADO.length;
        td.style.textAlign = 'center';
        td.className = 'vacio';
        td.textContent = state.mercado.length
          ? 'Sin resultados para el filtro.'
          : 'Presioná Actualizar para cargar los datos de mercado.';
        tr.appendChild(td); tbody.appendChild(tr);
      } else {
        for (const c of filas) {
          const tr = document.createElement('tr');
          tr.addEventListener('click', () => abrirDetalle(c.ticker_byma));
          for (const col of COLS_MERCADO) {
            const td = document.createElement('td');
            if (col.key === 'cartera') {
              const chk = document.createElement('input');
              chk.type = 'checkbox';
              chk.checked = !!activoDeTicker(c.ticker_byma);
              chk.addEventListener('click', (ev) => ev.stopPropagation());
              chk.addEventListener('change', (ev) => toggleCartera(c, ev.target.checked));
              td.appendChild(chk);
              tr.appendChild(td);
              continue;
            }
            const { texto, clase } = celdaMercado(c, col.key);
            td.textContent = texto;
            if (clase) td.className = clase;
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
      }
      tabla.innerHTML = '';
      tabla.appendChild(thead);
      tabla.appendChild(tbody);
    }

    // --- vista de detalle ---
    async function abrirDetalle(ticker, periodo = '3m') {
      state.view = 'detalle';
      state.detalleTicker = ticker;
      state.detallePeriodo = periodo;
      state.detalle = null;
      state.loading = true; state.error = null; render();
      const t = encodeURIComponent(ticker);
      try {
        // Dos fetches en paralelo; los fundamentales son opcionales (404 -> null) y no rompen la vista.
        const [hist, fund] = await Promise.all([
          api(`/mercado/${t}/historico?periodo=${periodo}`),
          api(`/mercado/${t}/fundamentales`).catch(() => null),
        ]);
        state.detalle = { ...hist, fundamentales: fund };
        const activo = state.activos.find((a) => a.ticker === ticker);
        state.detalleAnalisisTecnico = null;
        if (activo) {
          const lista = await api(`/activos/${activo.id}/analisis`).catch(() => []);
          state.detalleAnalisisTecnico = lista.find((a) => a.tipo === 'tecnico') || null;
        }
      } catch (e) {
        state.error = `No se pudo cargar el histórico de ${ticker}: ${e.message}`;
      } finally {
        state.loading = false; render();
      }
    }

    async function analizarTecnico(ticker) {
      const activo = state.activos.find((a) => a.ticker === ticker);
      state.loading = true; state.error = null; render();
      try {
        if (activo) {
          // En cartera: persiste el análisis y refresca historial y badges.
          await api(`/activos/${activo.id}/analisis/tecnico`, { method: 'POST' });
          await cargarActivos();
          await abrirDetalle(ticker, state.detallePeriodo);
        } else {
          // Fuera de cartera: computa al vuelo, sin guardar.
          const t = encodeURIComponent(ticker);
          state.detalleAnalisisTecnico = await api(`/mercado/${t}/tecnico`);
          state.loading = false; render();
        }
      } catch (e) {
        state.error = `No se pudo analizar ${ticker}: ${e.message}`;
        state.loading = false; render();
      }
    }

    async function toggleCarteraDetalle() {
      const ticker = state.detalleTicker;
      const enCartera = !!state.activos.find((a) => a.ticker === ticker);
      const fila = state.mercado.find((c) => c.ticker_byma === ticker);
      const fund = state.detalle && state.detalle.fundamentales;
      const nombre = (fila && fila.nombre) || (fund && fund.nombre) || ticker;
      await toggleCartera({ ticker_byma: ticker, nombre }, !enCartera);
    }

    function volverDashboard() {
      state.view = 'dashboard';
      state.detalle = null; state.detalleTicker = null;
      render();
    }

    function filaMetrica(label, valor) {
      const div = document.createElement('div');
      div.className = 'fila';
      const l = document.createElement('span'); l.textContent = label;
      const v = document.createElement('span'); v.textContent = valor;
      div.appendChild(l); div.appendChild(v);
      return div;
    }

    function filaSenal(label, senal) {
      const div = document.createElement('div');
      div.className = 'fila';
      const l = document.createElement('span'); l.textContent = label;
      div.appendChild(l);
      if (senal) {
        const pill = document.createElement('span');
        pill.className = `pill ${claseSenal(senal)}`;
        pill.textContent = senal;
        div.appendChild(pill);
      } else {
        const v = document.createElement('span'); v.textContent = '—';
        div.appendChild(v);
      }
      return div;
    }

    function pct(v) {
      // margen y ROE de yfinance vienen como fracción (0.27 -> 27%)
      return v == null ? '—' : `${(v * 100).toFixed(2)}%`;
    }
    function pctDirecto(v) {
      // dividendYield de yfinance ya viene como porcentaje (0.36 -> 0.36%)
      return v == null ? '—' : `${Number(v).toFixed(2)}%`;
    }

    function renderPaneles() {
      const m = (state.detalle && state.detalle.fundamentales) || {};

      // Tarjeta 1: Datos de la accion (sin senal/confianza)
      const acc = document.getElementById('panel-accion');
      acc.innerHTML = '';
      acc.appendChild(filaMetrica('Precio (USD)', fmtNum(m.precio_usd)));
      acc.appendChild(filaMetrica('Var % (dia)', m.var_pct != null ? `${fmtNum(m.var_pct)}%` : '—'));
      acc.appendChild(filaMetrica('Volumen', fmtAbrev(m.volumen)));
      acc.appendChild(filaMetrica('Market Cap', fmtAbrev(m.market_cap)));
      acc.appendChild(filaMetrica('52w High', fmtNum(m.w52_high)));
      acc.appendChild(filaMetrica('52w Low', fmtNum(m.w52_low)));

      // Tarjeta 2: Analisis fundamental
      const fun = document.getElementById('panel-fundamental');
      fun.innerHTML = '';
      fun.appendChild(filaMetrica('P/E', fmtNum(m.pe)));
      fun.appendChild(filaMetrica('EPS (TTM)', fmtNum(m.eps)));
      fun.appendChild(filaMetrica('Free Cash Flow', fmtAbrev(m.free_cash_flow)));
      fun.appendChild(filaMetrica('Margen Neto', pct(m.margen_neto)));
      fun.appendChild(filaMetrica('ROE', pct(m.roe)));
      fun.appendChild(filaMetrica('Price-to-Book', fmtNum(m.price_to_book)));
      fun.appendChild(filaMetrica('Dividend Yield', pctDirecto(m.dividend_yield)));

      // Tarjeta 3: Tecnico (on-demand, desde el ultimo Analisis)
      const tec = document.getElementById('panel-tecnico');
      tec.innerHTML = '';
      const enCartera = !!state.activos.find((a) => a.ticker === state.detalleTicker);
      const an = state.detalleAnalisisTecnico;
      if (an) {
        tec.appendChild(filaSenal('Señal', an.senal));
        tec.appendChild(filaMetrica('Score', an.score != null ? `${Math.round(an.score)}/100` : '—'));
        tec.appendChild(filaMetrica('Confianza', an.confianza != null ? `${Math.round(an.confianza * 100)}%` : '—'));
        const res = document.createElement('div'); res.className = 'resumen'; res.textContent = an.resumen;
        tec.appendChild(res);
      } else {
        const p = document.createElement('p'); p.className = 'vacio';
        p.textContent = 'Sin análisis técnico todavía. Tocá Analizar.';
        tec.appendChild(p);
      }
      const btn = document.createElement('button');
      btn.textContent = state.loading ? 'Analizando…' : 'Analizar';
      btn.disabled = state.loading;
      btn.addEventListener('click', () => analizarTecnico(state.detalleTicker));
      tec.appendChild(btn);
      if (!enCartera) {
        const nota = document.createElement('p'); nota.className = 'vacio'; nota.style.marginTop = 'var(--space-sm)';
        nota.textContent = 'No está en tu cartera: el análisis se muestra pero no se guarda en el historial.';
        tec.appendChild(nota);
      }
    }

    function renderPeriodos() {
      const cont = document.getElementById('periodos');
      cont.innerHTML = '';
      for (const p of ['1m', '3m', '6m', '1y']) {
        const b = document.createElement('button');
        b.textContent = p.toUpperCase();
        if (p === state.detallePeriodo) b.className = 'activo';
        b.addEventListener('click', () => abrirDetalle(state.detalleTicker, p));
        cont.appendChild(b);
      }
    }

    async function renderHistorialDetalle() {
      const cont = document.getElementById('detalle-historial');
      cont.innerHTML = '';
      const activo = state.activos.find((a) => a.ticker === state.detalleTicker);
      const h = document.createElement('h3'); h.textContent = 'Historial de análisis';
      cont.appendChild(h);
      if (!activo) {
        const p = document.createElement('p'); p.className = 'vacio';
        p.textContent = 'Este ticker no está en tu cartera. Tildalo en la tabla para guardar análisis.';
        cont.appendChild(p);
        return;
      }
      try {
        const lista = await api(`/activos/${activo.id}/analisis`);
        if (!lista.length) {
          const p = document.createElement('p'); p.className = 'vacio'; p.textContent = 'Sin análisis todavía.';
          cont.appendChild(p); return;
        }
        for (const a of lista) {
          const item = document.createElement('div'); item.className = 'analisis-item';
          const l1 = document.createElement('div'); l1.className = 'linea1';
          const pill = document.createElement('span'); pill.className = `pill ${claseSenal(a.senal)}`; pill.textContent = a.senal;
          const meta = document.createElement('span'); meta.textContent = `${a.tipo} · ${Math.round((a.confianza || 0) * 100)}%`;
          const fecha = document.createElement('span'); fecha.className = 'fecha'; fecha.textContent = fmtFechaArg(a.created_at);
          l1.append(pill, meta, fecha);
          const res = document.createElement('div'); res.className = 'resumen'; res.textContent = a.resumen;
          item.append(l1, res); cont.appendChild(item);
        }
      } catch (e) {
        const p = document.createElement('p'); p.className = 'estado error'; p.textContent = e.message;
        cont.appendChild(p);
      }
    }

    function renderDetalle() {
      document.getElementById('detalle-titulo').textContent = state.detalleTicker || '';
      const btnCart = document.getElementById('btn-cartera-detalle');
      const enCartera = !!state.activos.find((a) => a.ticker === state.detalleTicker);
      btnCart.textContent = enCartera ? 'Quitar de cartera' : '+ Agregar a cartera';
      btnCart.className = enCartera ? 'btn-quitar' : '';
      btnCart.disabled = state.loading;
      btnCart.onclick = toggleCarteraDetalle;
      renderPaneles();
      renderPeriodos();
      renderHistorialDetalle();
      dibujarGrafico();
    }

    function _puntos(series, ohlc) {
      // empareja cada valor con su fecha, descartando nulls (lightweight-charts no acepta null)
      return series.map((v, i) => (v == null ? null : { time: ohlc[i].time, value: v })).filter(Boolean);
    }

    function dibujarGrafico() {
      const cont = document.getElementById('chart-velas');
      const rsiCont = document.getElementById('chart-rsi');
      const macdCont = document.getElementById('chart-macd');
      cont.innerHTML = ''; rsiCont.innerHTML = ''; macdCont.innerHTML = '';
      if (!state.detalle || !state.detalle.ohlc || !window.LightweightCharts) return;
      const { ohlc, series } = state.detalle;

      const opts = { layout: { background: { color: '#fff' }, textColor: '#1a1a1a' }, height: cont.clientHeight,
        grid: { vertLines: { color: '#eef2f7' }, horzLines: { color: '#eef2f7' } } };

      // lightweight-charts v4: las series se crean con los métodos directos del chart.
      const chart = LightweightCharts.createChart(cont, opts);
      const velas = chart.addCandlestickSeries({ upColor: '#1e7d34', downColor: '#c62828',
        borderVisible: false, wickUpColor: '#1e7d34', wickDownColor: '#c62828' });
      velas.setData(ohlc);
      chart.addLineSeries({ color: getCssVar('--chart-sma20'), lineWidth: 2 }).setData(_puntos(series.sma20, ohlc));
      chart.addLineSeries({ color: getCssVar('--chart-sma50'), lineWidth: 2 }).setData(_puntos(series.sma50, ohlc));
      chart.timeScale().fitContent();

      const rsiChart = LightweightCharts.createChart(rsiCont, { ...opts, height: rsiCont.clientHeight });
      const rsiLine = rsiChart.addLineSeries({ color: '#0068b5', lineWidth: 1 });
      rsiLine.setData(_puntos(series.rsi, ohlc));
      rsiLine.createPriceLine({ price: 70, color: '#c62828', lineStyle: 2, lineWidth: 1 });
      rsiLine.createPriceLine({ price: 30, color: '#1e7d34', lineStyle: 2, lineWidth: 1 });
      rsiChart.timeScale().fitContent();

      const macdChart = LightweightCharts.createChart(macdCont, { ...opts, height: macdCont.clientHeight });
      macdChart.addHistogramSeries({ color: '#9aa5b1' }).setData(
        series.hist.map((v, i) => (v == null ? null : { time: ohlc[i].time, value: v,
          color: v >= 0 ? '#1e7d34' : '#c62828' })).filter(Boolean));
      macdChart.addLineSeries({ color: getCssVar('--chart-sma20'), lineWidth: 1 }).setData(_puntos(series.macd, ohlc));
      macdChart.addLineSeries({ color: getCssVar('--chart-sma50'), lineWidth: 1 }).setData(_puntos(series.signal, ohlc));
      macdChart.timeScale().fitContent();
    }

    // --- eventos ---
    document.getElementById('m-actualizar').addEventListener('click', actualizarMercado);
    document.getElementById('m-filtro').addEventListener('input', (ev) => {
      state.mercadoFiltro = ev.target.value; render();
    });
    document.getElementById('btn-volver').addEventListener('click', volverDashboard);

    async function init() {
      await Promise.all([cargarActivos(), cargarCedears(), cargarMercado()]);
    }
    init();
  </script>
</body>
</html>
